<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBPダービー (三連単専用)</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        select, button { font-size: 16px; padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:active { background: #218838; }
        .pool-title { background: #007bff; color: white; padding: 5px; border-radius: 5px; margin-top: 20px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f2f2f2; }
        .odds { font-weight: bold; color: #dc3545; }
        .info-text { font-size: 14px; color: #555; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚌 KBPダービー 🐎</h1>
    <h2>【三連単専用モード】</h2>
    <p class="info-text">1着・2着・3着の着順をドンピシャで当ててください．</p>
    <p>全員の総投票数（原資）: <span id="total-points">0</span> 票</p>

    <hr>

    <h3>【投票パネル】</h3>
    <div>
        <label>1着：</label>
        <select id="pick1" onchange="updateOptions()"></select>
        <br>
        <label>2着：</label>
        <select id="pick2" onchange="updateOptions()"></select>
        <br>
        <label>3着：</label>
        <select id="pick3"></select>
    </div>
    <br>

    <button onclick="castVote()">投票する</button>

    <div class="pool-title">📊 三連単オッズ掲示板</div>
    <div id="odds-tables"></div>
</div>

<script>
    const totalBuses = 5; // 1号車〜5号車
    let votePool = {
        total: 0,
        buses: {}
    };

    // プルダウンの選択肢をリアルタイムに制御する関数
    function updateOptions() {
        const p1Select = document.getElementById('pick1');
        const p2Select = document.getElementById('pick2');
        const p3Select = document.getElementById('pick3');

        // 現在選ばれている値を取得（初回は空）
        const p1Value = p1Select.value;
        const p2Value = p2Select.value;
        const p3Value = p3Select.value;

        // --- 1着のプルダウン生成（常に1〜5全部） ---
        if (p1Select.innerHTML === "") {
            let html = '<option value="">--選択--</option>';
            for (let i = 1; i <= totalBuses; i++) {
                html += `<option value="${i}">${i}号車</option>`;
            }
            p1Select.innerHTML = html;
            p1Select.value = p1Value;
        }

        // --- 2着のプルダウン生成（1着で選んだやつを除く） ---
        let p2Html = '<option value="">--選択--</option>';
        for (let i = 1; i <= totalBuses; i++) {
            if (String(i) !== p1Value) {
                p2Html += `<option value="${i}">${i}号車</option>`;
            }
        }
        p2Select.innerHTML = p2Html;
        // 1着と同じ値が残らないように引き継ぐ
        if (p2Value !== p1Value) p2Select.value = p2Value;

        // --- 3着のプルダウン生成（1着と2着で選んだやつを除く） ---
        let p3Html = '<option value="">--選択--</option>';
        const currentP2 = p2Select.value;
        for (let i = 1; i <= totalBuses; i++) {
            if (String(i) !== p1Value && String(i) !== currentP2) {
                p3Html += `<option value="${i}">${i}号車</option>`;
            }
        }
        p3Select.innerHTML = p3Html;
        if (p3Value !== p1Value && p3Value !== currentP2) p3Select.value = p3Value;
    }

    // 投票ボタンを押した時の処理
    function castVote() {
        const p1 = document.getElementById('pick1').value;
        const p2 = document.getElementById('pick2').value;
        const p3 = document.getElementById('pick3').value;

        // 未選択チェック
        if (!p1 || !p2 || !p3) {
            alert("1着から3着まで全部選んでな！");
            return;
        }

        // 三連単の買い目キー（例：1→2→3）
        const key = `${p1}→${p2}→${p3}`;

        // 投票の記録
        if (!votePool.buses[key]) votePool.buses[key] = 0;
        votePool.buses[key]++;
        votePool.total++;

        render();
    }

    // 画面の更新とオッズ計算
    function render() {
        document.getElementById('total-points').innerText = votePool.total;
        const tablesArea = document.getElementById('odds-tables');
        
        if (Object.keys(votePool.buses).length === 0) {
            tablesArea.innerHTML = "<p>投票はまだありません</p>";
            return;
        }

        let html = '<table><tr><th>買い目</th><th>票数</th><th>オッズ</th></tr>';
        
        for (let key in votePool.buses) {
            // オッズ ＝ 総票数 ／ その買い目の票数
            const odds = (votePool.total / votePool.buses[key]).toFixed(1);
            html += `
                <tr>
                    <td><strong>${key}</strong></td>
                    <td>${votePool.buses[key]}票</td>
                    <td class="odds">${odds}倍</td>
                </tr>
            `;
        }
        html += `</table>`;
        tablesArea.innerHTML = html;
    }

    // 起動時にプルダウンを初期化
    updateOptions();
</script>
</body>
</html>
